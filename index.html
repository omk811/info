<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مجتمع اللغة العربية - الصف الخامس</title>

  <!-- الخطوط -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #ecfdf5, #e0f2fe);
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .form-card {
      width: 100%;
      max-width: 600px;
      background: #ffffff;
      border-radius: 28px;
      padding: 2.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      position: relative;
    }

    .form-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .form-header h1 {
      margin: 0;
      font-size: 2rem;
      color: #0f766e;
    }

    .form-header p {
      color: #64748b;
      margin-top: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #1e293b;
    }

    .form-input {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 14px;
      border: 2px solid #e2e8f0;
      font-size: 1rem;
      background: #f8fafc;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      border-radius: 14px;
      border: none;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      background: #0d9488;
      cursor: pointer;
    }

    /* ============================== */
    /* تغطية إيقاف التسجيل */
    /* ============================== */
    .registration-closed-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(5px);
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 28px;
    }

    .closed-message {
      text-align: center;
      line-height: 1.9;
      color: #1e293b;
    }

    .closed-message p {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0.3rem 0;
    }

    .closed-message .signature {
      margin-top: 1rem;
      font-weight: 800;
      color: #0f766e;
    }
  </style>
</head>

<body>

  <div class="form-card">

    <!-- تغطية إيقاف التسجيل -->
    <div class="registration-closed-overlay">
      <div class="closed-message">
        <p>السلام عليكم ورحمة الله وبركاته</p>
        <p>لقد توقف الموقع عن استقبال الملاحظات</p>
        <p>دمتم بخير</p>
        <p class="signature">الأستاذ خليل البلوشي</p>
      </div>
    </div>

    <!-- رأس النموذج -->
    <div class="form-header">
      <h1>مجتمع اللغة العربية</h1>
      <p>نموذج الانضمام – الصف الخامس</p>
    </div>

    <!-- النموذج (مغلق بالتغطية) -->
    <form>
      <div class="form-group">
        <label class="form-label">الاسم الثلاثي</label>
        <input type="text" class="form-input" placeholder="أدخل الاسم">
      </div>

      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" class="form-input" placeholder="example@email.com">
      </div>

      <div class="form-group">
        <label class="form-label">رقم الهاتف</label>
        <input type="tel" class="form-input" placeholder="99123456">
      </div>

      <button type="submit" class="submit-btn">إرسال</button>
    </form>

  </div>

</body>
</html>
