<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>صندوق التواصل – الأستاذ خليل البلوشي</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --secondary: #7c3aed;
      --accent: #f59e0b;
      --accent-warm: #fb923c;
      --success: #059669;
      --danger: #dc2626;
      --bg: #060b18;
      --surface: #0d1526;
      --surface2: #111d35;
      --surface3: #162040;
      --border: rgba(99,140,255,0.12);
      --border-bright: rgba(99,140,255,0.25);
      --text: #e8eeff;
      --text-dim: #7a90b8;
      --text-muted: #3d5280;
      --radius-sm: 12px;
      --radius: 18px;
      --radius-lg: 24px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 40px rgba(37,99,235,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "IBM Plex Sans Arabic", "Tajawal", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 90px;
      overflow-x: hidden;
    }

    /* === BACKGROUND === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(37,99,235,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 110%, rgba(124,58,237,0.10) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 20px 16px;
      position: relative;
      z-index: 1;
    }

    /* === HERO === */
    .hero {
      text-align: center;
      padding: 40px 24px 36px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(124,58,237,0.06));
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-lg);
    }

    .hero-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
      animation: float 3s ease-in-out infinite;
      position: relative;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .hero h1 {
      font-family: "Tajawal", sans-serif;
      font-size: 1.65rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
      position: relative;
    }

    .hero p {
      color: var(--text-dim);
      font-size: 0.95rem;
      position: relative;
    }

    .hero p strong {
      color: var(--accent);
      font-weight: 600;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37,99,235,0.12);
      border: 1px solid rgba(37,99,235,0.25);
      color: #93c5fd;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 14px;
      font-weight: 500;
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      background: #22d3ee;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* === CARD === */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      transition: border-color 0.3s;
    }

    .card:hover {
      border-color: var(--border-bright);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .card-icon.blue { background: rgba(37,99,235,0.15); color: #60a5fa; }
    .card-icon.green { background: rgba(5,150,105,0.15); color: #34d399; }

    .card-title {
      font-family: "Tajawal", sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    /* === FORM === */
    .form-group {
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      resize: none;
    }

    input[type="text"]::placeholder, textarea::placeholder {
      color: var(--text-muted);
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--primary-light);
      background: var(--surface3);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    textarea { min-height: 110px; line-height: 1.7; }

    /* File Upload */
    .upload-area {
      background: var(--surface2);
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      color: var(--text-dim);
      font-size: 0.88rem;
    }

    .upload-area:hover {
      border-color: var(--primary-light);
      background: var(--surface3);
      color: #93c5fd;
    }

    .upload-area i { font-size: 1.4rem; display: block; margin-bottom: 6px; }

    /* === BUTTONS === */
    .btn-send {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: "Tajawal", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(37,99,235,0.3);
    }

    .btn-send::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-send:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37,99,235,0.4);
    }

    .btn-send:hover::before { opacity: 1; }
    .btn-send:active { transform: translateY(0); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--text-dim);
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-refresh:hover {
      background: rgba(99,140,255,0.08);
      color: var(--text);
      border-color: var(--primary-light);
    }

    .btn-refresh.spinning i { animation: spin 0.6s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status */
    .status-msg {
      text-align: center;
      margin-top: 12px;
      font-size: 0.88rem;
      min-height: 20px;
      border-radius: 8px;
      padding: 0;
      transition: all 0.3s;
    }

    .status-msg.show {
      padding: 10px 16px;
      background: var(--surface2);
    }

    /* === NOTE ITEMS === */
    .notes-list { display: flex; flex-direction: column; gap: 14px; }

    .note-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .note-item::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, var(--accent), var(--accent-warm));
    }

    .note-item:hover {
      border-color: var(--border-bright);
      transform: translateX(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .note-author {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .avatar {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      flex-shrink: 0;
    }

    .note-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .note-text {
      font-size: 0.92rem;
      color: var(--text-dim);
      line-height: 1.75;
    }

    .note-img {
      max-width: 100%;
      max-height: 160px;
      border-radius: 10px;
      margin-top: 12px;
      cursor: zoom-in;
      border: 1px solid var(--border);
      transition: opacity 0.2s;
      display: block;
    }

    .note-img:hover { opacity: 0.85; }

    /* Reply Box */
    .reply-box {
      margin-top: 16px;
      background: var(--surface3);
      border: 1px solid rgba(5,150,105,0.2);
      border-radius: var(--radius-sm);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .reply-box::before {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, #059669, #34d399);
    }

    .reply-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #34d399;
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }

    .reply-text {
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 1.75;
    }

    .reply-img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 10px;
      display: block;
    }

    /* Link */
    .link {
      color: #60a5fa;
      text-decoration: none;
      border-bottom: 1px solid rgba(96,165,250,0.3);
      word-break: break-all;
      transition: color 0.2s;
    }
    .link:hover { color: #93c5fd; border-color: rgba(147,197,253,0.4); }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 14px; display: block; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
      height: 16px;
      margin-bottom: 8px;
    }
    .skeleton.h-tall { height: 80px; }
    .skeleton.w-half { width: 50%; }
    .skeleton.w-third { width: 35%; }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* === BOTTOM NAV === */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(6, 11, 24, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      padding: 10px 5px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      z-index: 2000;
    }

    .nav-item {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      text-align: center;
      flex: 1;
      padding: 6px 4px;
      border-radius: 10px;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .nav-item i { font-size: 1.25rem; }

    .nav-item.active {
      color: #fff;
      background: rgba(37,99,235,0.15);
    }

    .nav-item:not(.active):hover {
      color: var(--text-dim);
      background: rgba(255,255,255,0.04);
    }

    .nav-item.admin { color: #f87171; }
    .nav-item.admin:hover { color: #fca5a5; background: rgba(248,113,113,0.08); }

    /* === MODAL === */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 3000;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
      padding: 20px;
    }

    .modal.open { display: flex; animation: fadeIn 0.2s; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      animation: zoomIn 0.25s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 6px 0 18px;
    }

    /* Count badge */
    .count-badge {
      background: rgba(37,99,235,0.15);
      color: #60a5fa;
      font-size: 0.75rem;
      padding: 2px 9px;
      border-radius: 100px;
      font-weight: 600;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="container">

    <!-- Hero -->
    <header class="hero">
      <div class="badge"><span class="dot"></span> مدرسة سعد بن معاذ للتعليم الأساسي</div>
      <div class="hero-icon">📬</div>
      <h1>استفسارات وأسئلة الصف الخامس</h1>
      <p>بإشراف <strong>الأستاذ خليل البلوشي</strong> | لغتي الجميلة </p>
    </header>

    <!-- Send Form -->
    <div class="card" id="send">
      <div class="card-header">
        <div class="card-icon blue"><i class="fas fa-pen-fancy"></i></div>
        <div>
          <div class="card-title">إرسال سؤال أو استفسار</div>
        </div>
      </div>
      <div class="divider"></div>

      <div class="form-group">
        <label class="form-label">الاسم</label>
        <input type="text" id="name" placeholder="أدخل اسمك (طالب / ولي أمر)">
      </div>

      <div class="form-group">
        <label class="form-label">الرسالة</label>
        <textarea id="note" placeholder="اكتب سؤالك أو استفسارك هنا..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">صورة مرفقة (اختياري)</label>
        <div class="upload-area" onclick="document.getElementById('image').click()">
          <i class="fas fa-cloud-upload-alt"></i>
          <span id="fileLabel">اضغط لرفع صورة أو اسحبها هنا</span>
        </div>
        <input type="file" id="image" accept="image/*" style="display:none">
      </div>

      <button class="btn-send" id="sendBtn" onclick="sendNote()">
        <i class="fas fa-paper-plane" style="margin-left: 8px;"></i> إرسال الرسالة
      </button>
      <div class="status-msg" id="formStatus"></div>
    </div>

    <!-- Replies -->
    <div class="card" id="replies-section">
      <div class="card-header" style="margin-bottom: 0;">
        <div class="card-icon green"><i class="fas fa-comment-dots"></i></div>
        <div style="flex: 1;">
          <div class="card-title">
            الردود الواردة
            <span class="count-badge" id="replyCount">0</span>
          </div>
        </div>
        <button class="btn-refresh" id="refreshBtn" onclick="loadReplies()">
          <i class="fas fa-rotate-right"></i> تحديث
        </button>
      </div>
      <div class="divider" style="margin-top: 18px;"></div>
      <div id="replies">
        <div class="skeleton"></div>
        <div class="skeleton w-half"></div>
        <div class="skeleton h-tall" style="margin-top:10px;"></div>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item active">
      <i class="fas fa-house"></i>
      <span>الرئيسية</span>
    </a>
    <a href="#send" class="nav-item">
      <i class="fas fa-plus-circle"></i>
      <span>إرسال</span>
    </a>
    <a href="#replies-section" class="nav-item">
      <i class="fas fa-reply-all"></i>
      <span>الردود</span>
    </a>
    <a href="admin.html" class="nav-item admin">
      <i class="fas fa-user-shield"></i>
      <span>الإدارة</span>
    </a>
  </nav>

  <!-- Modal -->
  <div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg" alt="صورة مرفقة">
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbw1qGg0ZASORdCNI7YjiHkB0fS04tFG_BOfgu1O7kjKC2I4PDws6kmFC6LAGr83XRBB/exec";

    // ── Helpers ──────────────────────────────────────────
    const linkify = t => !t ? "" :
      t.replace(/(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#/%?=~_|!:,.;]*[-A-Z0-9+&@#/%=~_|])/ig,
        '<a href="$1" target="_blank" rel="noopener" class="link">$1</a>');

    const toBase64 = f => new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.readAsDataURL(f);
    });

    const initial = name => {
      const parts = name?.trim().split(" ") || [];
      return parts.length >= 2 ? parts[0][0] + parts[1][0] : (parts[0]?.[0] || "؟");
    };

    // ── Send ──────────────────────────────────────────────
    async function sendNote() {
      const name = document.getElementById("name").value.trim() || "مجهول";
      const note = document.getElementById("note").value.trim();
      const btn  = document.getElementById("sendBtn");
      const statusEl = document.getElementById("formStatus");
      const file = document.getElementById("image").files[0];

      if (!note) {
        showStatus("⚠️ يرجى كتابة الرسالة أولاً", "#f59e0b");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-left:8px;"></i> جاري الإرسال...';
      showStatus("", "");

      const imgBase64 = file ? await toBase64(file) : "";

      try {
        const res = await fetch(API, {
          method: "POST",
          body: JSON.stringify({ type: "add", name, note, image: imgBase64 })
        });
        const data = await res.json();
        if (data.success) {
          showStatus("✅ تم إرسال رسالتك بنجاح!", "#34d399");
          document.getElementById("note").value = "";
          document.getElementById("image").value = "";
          document.getElementById("fileLabel").textContent = "اضغط لرفع صورة أو اسحبها هنا";
          loadReplies();
        } else {
          showStatus("❌ لم يتم الإرسال. حاول مرة أخرى", "#f87171");
        }
      } catch {
        showStatus("❌ فشل الاتصال بالخادم", "#f87171");
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane" style="margin-left:8px;"></i> إرسال الرسالة';
    }

    function showStatus(msg, color) {
      const el = document.getElementById("formStatus");
      el.textContent = msg;
      el.style.color = color;
      el.className = "status-msg" + (msg ? " show" : "");
    }

    // ── Load Replies ──────────────────────────────────────
    async function loadReplies() {
      const container = document.getElementById("replies");
      const btn = document.getElementById("refreshBtn");
      btn.classList.add("spinning");

      container.innerHTML = `
        <div class="skeleton"></div>
        <div class="skeleton w-half"></div>
        <div class="skeleton h-tall" style="margin-top:10px;"></div>
        <div class="skeleton w-third" style="margin-top:16px;"></div>
        <div class="skeleton h-tall" style="margin-top:10px;"></div>
      `;

      try {
        const res  = await fetch(API, { method: "POST", body: JSON.stringify({ type: "get" }) });
        const data = await res.json();
        const replied = (data.data || [])
          .filter(n => n.reply?.trim())
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        document.getElementById("replyCount").textContent = replied.length;

        if (!replied.length) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <p>لا توجد ردود حتى الآن.<br>أرسل سؤالك وسيرد عليك الأستاذ قريباً.</p>
            </div>`;
          return;
        }

        container.innerHTML = '<div class="notes-list">' + replied.map((n, i) => `
          <div class="note-item" style="animation-delay:${i * 0.06}s">
            <div class="note-meta">
              <div class="note-author">
                <div class="avatar">${initial(n.name)}</div>
                ${escHtml(n.name)}
              </div>
              <div class="note-date">
                <i class="fas fa-clock"></i>
                ${new Date(n.date).toLocaleDateString('ar-OM', { year:'numeric', month:'short', day:'numeric' })}
              </div>
            </div>
            <div class="note-text">${linkify(n.note || "").replace(/\n/g,"<br>")}</div>
            ${n.image ? `<img src="${n.image}" class="note-img" onclick="showModal('${n.image}')" loading="lazy">` : ""}
            <div class="reply-box">
              <div class="reply-label">
                <i class="fas fa-check-double"></i> رد الأستاذ خليل
              </div>
              <div class="reply-text">${linkify(n.reply || "").replace(/\n/g,"<br>")}</div>
              ${n.replyImage ? `<img src="${n.replyImage}" class="reply-img" onclick="showModal('${n.replyImage}')" loading="lazy">` : ""}
            </div>
          </div>
        `).join("") + '</div>';
      } catch {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-triangle-exclamation"></i>
            <p>تعذّر تحميل البيانات. تحقق من الاتصال وحاول مجدداً.</p>
          </div>`;
      }

      btn.classList.remove("spinning");
    }

    // XSS guard
    function escHtml(str) {
      return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Modal ─────────────────────────────────────────────
    function showModal(src) {
      document.getElementById("modalImg").src = src;
      document.getElementById("modal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
    }

    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    // ── File input ────────────────────────────────────────
    document.getElementById("image").onchange = function() {
      if (this.files[0]) {
        document.getElementById("fileLabel").textContent = "✓ " + this.files[0].name;
      }
    };

    // ── Init ──────────────────────────────────────────────
    loadReplies();
  </script>
</body>
</html>
